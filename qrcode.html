<!DOCTYPE html>
<html>
<head>
<title>RunWars - Scan QR Code</title>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<style>
body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #1a1a2e; color: white; font-family: 'Segoe UI', sans-serif; flex-direction: column; }
.container { text-align: center; background: #16213e; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(0,212,255,0.2); }
h1 { color: #00d4ff; margin-bottom: 10px; }
p { color: #aaa; margin-bottom: 20px; }
#qrcode { background: white; padding: 20px; border-radius: 10px; display: inline-block; }
.url { color: #00d4ff; font-family: monospace; font-size: 14px; margin-top: 20px; }
</style>
</head>
<body>
<div class="container">
<h1>🏃 RunWars</h1>
<p>Scan with Expo Go on your phone</p>
<div id="qrcode"></div>
<p class="url">exp://192.168.1.20:8081</p>
<p style="font-size:12px; color:#666;">Make sure your phone is on the same WiFi network</p>
</div>
<script>
var qr = qrcode(0, 'M');
qr.addData('exp://192.168.1.20:8081');
qr.make();
document.getElementById('qrcode').innerHTML = qr.createImgTag(8, 0);
</script>
</body>
</html>
